contracts:
  - changed-files:
      - any-glob-to-any-file: "contracts/**"

indexer:
  - changed-files:
      - any-glob-to-any-file: "indexer/**"

frontend:
  - changed-files:
      - any-glob-to-any-file: "frontend/**"

ci/cd:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

infrastructure:
  - changed-files:
      - any-glob-to-any-file: "infra/**"

documentation:
  - changed-files:
      - any-glob-to-any-file: "docs/**"
      - any-glob-to-any-file: "*.md"

dependencies:
  - changed-files:
      - any-glob-to-any-file: "**/package.json"
      - any-glob-to-any-file: "**/package-lock.json"
      - any-glob-to-any-file: "**/Cargo.toml"
      - any-glob-to-any-file: "**/Cargo.lock"
