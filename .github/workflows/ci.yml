name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Rust fmt check
        run: cargo fmt --check
        working-directory: contracts/explorer

      - name: Rust clippy (workspace)
        run: cargo clippy -- -D warnings

      # Node toolchain
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache indexer node_modules
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: indexer-20-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: indexer-20-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-20-

      - name: Install indexer deps
        run: npm install
        working-directory: indexer

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: ESLint — indexer
        run: npx eslint --max-warnings 0 src/
        working-directory: indexer

      - name: ESLint — frontend
        run: npx eslint --max-warnings 0 src/
        working-directory: frontend

      - name: Prettier check
        run: >
          npx prettier --check
          "indexer/src/**/*.{js,json}"
          "frontend/src/**/*.{ts,tsx}"
          "**/*.md"
          "!**/node_modules/**"
          "!**/dist/**"

      - name: PR title (conventional commits)
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Rust Contract ──────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check --all-features
        run: cargo check --all-features

      - name: cargo test --all-features
        run: cargo test -p soroban-explorer-contract --all-features
        working-directory: contracts/explorer

      - name: cargo doc --all-features
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── 3. Indexer ────────────────────────────────────────────────────────────────
  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: indexer-20-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: indexer-20-

      - name: Install
        run: npm ci
        working-directory: indexer

      - name: Audit (high/critical)
        run: npm audit --audit-level=high
        working-directory: indexer

      - name: Test
        run: npm test
        working-directory: indexer

      - name: Test with coverage thresholds
        run: >
          node --test
          --experimental-test-coverage
          --test-coverage-branches=70
          --test-coverage-functions=75
          --test-coverage-lines=80
          --test-coverage-statements=80
          test/**/*.test.js
        working-directory: indexer

  # ── 4. Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-20-

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Audit (high/critical)
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Build (typecheck + Vite)
        run: npm run build
        working-directory: frontend

  # ── 4b. E2E Tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend, indexer]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soroban
          POSTGRES_PASSWORD: soroban_secret
          POSTGRES_DB: soroban_explorer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache e2e node_modules
        uses: actions/cache@v4
        with:
          path: e2e/node_modules
          key: e2e-20-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: e2e-20-

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: e2e

      - name: Start indexer in background
        run: |
          npm start > indexer.log 2>&1 &
          sleep 5
        working-directory: indexer
        env:
          DATABASE_URL: postgres://soroban:soroban_secret@localhost:5432/soroban_explorer
          NODE_ENV: test
          PORT: 3001

      - name: Start frontend in background
        run: |
          npm run dev > frontend.log 2>&1 &
          sleep 5
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3001

      - name: API Integration Tests
        run: npm run test:api
        working-directory: e2e
        env:
          INDEXER_URL: http://localhost:3001
          DATABASE_URL: postgres://soroban:soroban_secret@localhost:5432/soroban_explorer

      - name: Chaos Engineering Tests
        run: npm run test:chaos
        working-directory: e2e
        env:
          INDEXER_URL: http://localhost:3001
          DATABASE_URL: postgres://soroban:soroban_secret@localhost:5432/soroban_explorer

      - name: Property-Based Tests
        run: npm run test:property
        working-directory: e2e
        env:
          INDEXER_URL: http://localhost:3001

      - name: Playwright Browser Tests
        run: npm run test:playwright
        working-directory: e2e
        env:
          FRONTEND_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 30

      - name: Collect logs
        if: failure()
        run: |
          tar -czf logs.tar.gz indexer.log frontend.log
          ls -lh logs.tar.gz
        working-directory: e2e

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e/logs.tar.gz
          retention-days: 7

  # ── 5. Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build indexer image
        uses: docker/build-push-action@v6
        with:
          context: ./indexer
          push: false
          tags: indexer:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: frontend:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ── 6. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: CodeQL autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high


